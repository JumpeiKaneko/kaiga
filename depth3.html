<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Monet</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        }
        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }
        img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }
        .credit {
            position: absolute;
            bottom: 4vh;
            color: #777777;
            font-size: 11px;
            letter-spacing: 0.05em;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="image/03_air.jpg" alt="Claude Monet">
        <div class="credit">
            Claude Monet, <i>The Water-Lily Pond</i>, 1899, The National Gallery, London
        </div>
    </div>
</body>
</html>
